name: Infra Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "environments/dev/**"
      - ".github/workflows/infra.yml"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-south-1
  TF_STATE_BUCKET: fasi-tf-state-bucket

jobs:
  terraform-dev:
    name: Terraform Dev State
    runs-on: ubuntu-latest
    environment: dev-apply
    env:
      TF_WORKING_DIR: environments/dev/dev
      TF_STATE_KEY: dev/terraform.tfstate
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Import AWS credentials from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          path: jwt
          role: github-terraform
          exportToken: true
          secrets: |
            aws/creds/terraform-infra access_key | AWS_ACCESS_KEY_ID ;
            aws/creds/terraform-infra secret_key | AWS_SECRET_ACCESS_KEY ;
            aws/creds/terraform-infra security_token | AWS_SESSION_TOKEN
      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="use_lockfile=true"
      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate
      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan
      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

  terraform-vpc:
    name: Terraform VPC
    needs: terraform-dev
    runs-on: ubuntu-latest
    environment: dev-apply
    env:
      TF_WORKING_DIR: environments/dev/vpc
      TF_STATE_KEY: vpc/terraform.tfstate
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Import AWS credentials from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          path: jwt
          role: github-terraform
          exportToken: true
          secrets: |
            aws/creds/terraform-infra access_key | AWS_ACCESS_KEY_ID ;
            aws/creds/terraform-infra secret_key | AWS_SECRET_ACCESS_KEY ;
            aws/creds/terraform-infra security_token | AWS_SESSION_TOKEN
      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="use_lockfile=true"
      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate
      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan
      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

  terraform-ecr:
    name: Terraform ECR
    needs: terraform-dev
    runs-on: ubuntu-latest
    environment: dev-apply
    env:
      TF_WORKING_DIR: environments/dev/ecr
      TF_STATE_KEY: ecr/terraform.tfstate
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Import AWS credentials from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          path: jwt
          role: github-terraform
          exportToken: true
          secrets: |
            aws/creds/terraform-infra access_key | AWS_ACCESS_KEY_ID ;
            aws/creds/terraform-infra secret_key | AWS_SECRET_ACCESS_KEY ;
            aws/creds/terraform-infra security_token | AWS_SESSION_TOKEN
      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="use_lockfile=true"
      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate
      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan
      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

  terraform-eks:
    name: Terraform EKS
    needs:
      - terraform-vpc
      - terraform-ecr
    runs-on: ubuntu-latest
    environment: dev-apply
    env:
      TF_WORKING_DIR: environments/dev/eks
      TF_STATE_KEY: eks/terraform.tfstate
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Import AWS credentials from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          path: jwt
          role: github-terraform
          exportToken: true
          secrets: |
            aws/creds/terraform-infra access_key | AWS_ACCESS_KEY_ID ;
            aws/creds/terraform-infra secret_key | AWS_SECRET_ACCESS_KEY ;
            aws/creds/terraform-infra security_token | AWS_SESSION_TOKEN
      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="use_lockfile=true"
      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate
      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan
      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan
